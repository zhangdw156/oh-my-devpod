services:
  claudepod:
    image: ghcr.io/zhangdw156/claudepod:${IMAGE_VERSION:-latest}
    # To build locally instead of pulling, uncomment the build section
    # and first build the devpod base image:
    #   docker build -f Dockerfile.devpod -t ghcr.io/zhangdw156/devpod:local .
    # build:
    #   context: ../..
    #   dockerfile: docker/claudepod/Dockerfile
    #   network: host
    #   args:
    #     DEVPOD_BASE_IMAGE: ghcr.io/zhangdw156/devpod:${IMAGE_VERSION:-latest}
    container_name: claudepod
    user: "${UID:-1000}:${GID:-1000}"
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - ${PROJECT_DIR:-../..}:/workspace
    network_mode: host
    restart: "no"
